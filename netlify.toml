[build]
  command = "npm run build:netlify"

[build.environment]
  NODE_VERSION = "22.13.0"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    X-Content-Type-Options = "nosniff"
